<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GRIDLOCK — Free Browser Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* KEEPING ORIGINAL UI EXACTLY */
:root{
  --bg:#030303;
  --s1:#0a0a0a;
  --border:#1f1f1f;
  --accent:#00ff88;
  --accent2:#ff2d55;
  --accent3:#7b61ff;
  --text:#e0e0e0;
  --muted2:#555;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace}

/* HEADER */
header{
  position:sticky;top:0;z-index:200;
  background:#030303;
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;justify-content:space-between;align-items:center;
}
.logo{
  font-family:'Orbitron';
  font-weight:900;
  color:var(--accent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
  padding:20px;
}

/* CARD */
.card{
  background:var(--s1);
  border:1px solid var(--border);
  cursor:pointer;
  transition:.2s;
}
.card:hover{
  border-color:var(--accent);
  transform:translateY(-4px);
}
.cover{
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  font-size:32px;
}
.body{padding:12px}
.card-title{font-family:'Orbitron';font-size:14px}

/* MODAL */
.backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;justify-content:center;
}
.backdrop.open{display:flex}
.modal{
  width:90%;height:90%;
  background:#000;
  display:flex;
  flex-direction:column;
}
.modal-bar{
  padding:10px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.modal-x{
  cursor:pointer;
}
iframe{flex:1;border:none}
</style>
</head>

<body>

<header>
  <div class="logo">GRIDLOCK</div>
</header>

<div class="grid" id="grid"></div>

<div class="backdrop" id="bd">
  <div class="modal">
    <div class="modal-bar">
      <span id="mn"></span>
      <span class="modal-x" onclick="close()">✕</span>
    </div>
    <iframe id="gf"></iframe>
  </div>
</div>

<script>
const G = [

  // YOUR GAMES
  {
    title:"Traffic Jam 3D",
    tag:"arcade",
    bg:"#001a08",
    tc:"#00ff88",
    url:"https://html5.gamedistribution.com/337302b23b5943d8bcfc501d81d50cdb/?gd_sdk_referrer_url=https://trafficjam3d.com"
  },
  {
    title:"2games",
    tag:"arcade",
    bg:"#000",
    tc:"#00ff88",
    url:"https://2games.io",
    external:true
  },
  {
    title:"1games.io",
    tag:"arcade",
    bg:"#000",
    tc:"#00ff88",
    url:"https://1games.io",
    external:true
  },
  {
    title:"cpsgames.org",
    tag:"arcade",
    bg:"#000",
    tc:"#61d4ff",
    url:"https://cpsgames.org",
    external:true
  },

  // ORIGINAL STYLE GAMES (sample)
  {
    title:"2048",
    tag:"puzzle",
    bg:"#111",
    tc:"#f5c518",
    url:"https://play2048.co"
  },
  {
    title:"Dino Run",
    tag:"arcade",
    bg:"#000",
    tc:"#00ff88",
    url:"https://chromedino.com"
  }

];

function render(){
  document.getElementById('grid').innerHTML = G.map((g,i)=>`
    <div class="card" onclick="openGame(${i})">
      <div class="cover" style="background:${g.bg};color:${g.tc}">
        ${g.title.slice(0,4).toUpperCase()}
      </div>
      <div class="body">
        <div class="card-title">${g.title}</div>
      </div>
    </div>
  `).join('');
}

function openGame(i){
  const g = G[i];

  if(g.external){
    window.open(g.url, "_blank");
    return;
  }

  document.getElementById("mn").innerText = g.title;
  document.getElementById("gf").src = g.url;
  document.getElementById("bd").classList.add("open");
}

function close(){
  document.getElementById("bd").classList.remove("open");
  document.getElementById("gf").src="";
}

render();
</script>

</body>
</html>

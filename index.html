<!DOCTYPE html>
<html>
<head>
<title>Games Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #020617;
  position: sticky;
  top: 0;
  z-index: 10;
}

h1 {
  margin: 0;
  font-size: 40px;
}

#search {
  margin-top: 15px;
  padding: 12px;
  width: 300px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

#gamesGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.game-card {
  background: #1e293b;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.game-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.game-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.game-title {
  padding: 10px;
  text-align: center;
  font-size: 18px;
}

#gameContainer {
  display: none;
  width: 100%;
  height: 100vh;
}

#topBar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #020617;
  padding: 10px;
  z-index: 10;
}

#backBtn {
  padding: 10px 20px;
  background: #ef4444;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<header>
  <h1>Games Hub</h1>
  <input type="text" id="search" placeholder="Search games..." onkeyup="searchGames()">
</header>

<div id="gamesGrid">

  <div class="game-card" data-name="traffic jam 3d" onclick="loadGame('traffic')">
    <img src="https://imgs.crazygames.com/traffic-jam-3d_16x9/20230913083516/traffic-jam-3d_16x9-cover?metadata=none&quality=70&width=640">
    <div class="game-title">Traffic Jam 3D</div>
  </div>

  <div class="game-card" data-name="2games arcade" onclick="loadGame('2games')">
    <img src="https://2games.io/cache/data/image/options/2gamesio-f100x45.webp">
    <div class="game-title">2games</div>
  </div>

  <div class="game-card" data-name="1games io" onclick="loadGame('1games')">
    <img src="https://1games.io/favicon.ico">
    <div class="game-title">1games.io</div>
  </div>

  <div class="game-card" data-name="cpsgames org" onclick="loadGame('cpsgames')">
    <img src="https://cpsgames.org/favicon.ico">
    <div class="game-title">cpsgames.org</div>
  </div>

</div>

<div id="gameContainer">
  <div id="topBar">
    <button id="backBtn" onclick="goBack()">← Back</button>
  </div>
  <iframe id="gameFrame"></iframe>
</div>

<script>
function loadGame(game) {
  document.getElementById("gamesGrid").style.display = "none";
  document.querySelector("header").style.display = "none";
  document.getElementById("gameContainer").style.display = "block";

  if (game === "traffic") {
    document.getElementById("gameFrame").src =
      "https://html5.gamedistribution.com/337302b23b5943d8bcfc501d81d50cdb/?gd_sdk_referrer_url=https://trafficjam3d.com";
  }

  if (game === "2games") {
    document.getElementById("gameFrame").src = "https://2games.io";
  }

  if (game === "1games") {
    document.getElementById("gameFrame").src = "https://1games.io";
  }

  if (game === "cpsgames") {
    document.getElementById("gameFrame").src = "https://cpsgames.org";
  }
}

function goBack() {
  document.getElementById("gamesGrid").style.display = "grid";
  document.querySelector("header").style.display = "block";
  document.getElementById("gameContainer").style.display = "none";
  document.getElementById("gameFrame").src = "";
}

function searchGames() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("game-card");

  for (let i = 0; i < cards.length; i++) {
    let name = cards[i].getAttribute("data-name");
    cards[i].style.display = name.includes(input) ? "block" : "none";
  }
}
</script>

</body>
</html>
